<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Единорог Васи | TG Portal</title>
    <!-- Предотвращение выделения текста (антикопирование) и контекстного меню -->
    <style>
        * {
            user-select: none; /* запрет выделения текста на всех элементах */
            -webkit-tap-highlight-color: transparent;
        }
        body {
            margin: 0;
            min-height: 100vh;
            background: radial-gradient(circle at 20% 30%, #2a0505, #4a0a0a, #1f0202);
            font-family: 'Segoe UI', 'Poppins', 'Inter', system-ui, -apple-system, 'Roboto', sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
            backdrop-filter: blur(2px);
        }
        /* Главный глянцевый карточный контейнер */
        .glass-card {
            max-width: 550px;
            width: 100%;
            background: rgba(20, 0, 0, 0.45);
            backdrop-filter: blur(14px);
            border-radius: 64px 48px 64px 48px;
            box-shadow: 0 25px 45px rgba(0,0,0,0.5), inset 0 1px 1px rgba(255,255,255,0.2);
            border: 1px solid rgba(255, 80, 80, 0.5);
            padding: 28px 24px 40px;
            transition: all 0.3s ease;
            text-align: center;
        }
        /* Аватар группы */
        .avatar-wrapper {
            margin: 0 auto 16px;
            width: 130px;
            height: 130px;
            border-radius: 50%;
            background: linear-gradient(145deg, #ff4d4d, #b11a1a);
            padding: 4px;
            box-shadow: 0 12px 25px rgba(0,0,0,0.5), 0 0 0 2px rgba(255,100,100,0.6);
            backdrop-filter: blur(2px);
        }
        .avatar {
            width: 100%;
            height: 100%;
            border-radius: 50%;
            object-fit: cover;
            background: #300000;
            display: block;
            border: 1px solid rgba(255,200,200,0.7);
        }
        /* Название группы */
        .group-name {
            font-size: 2rem;
            font-weight: 800;
            letter-spacing: 1px;
            background: linear-gradient(135deg, #FFDDDD, #ff9a9a);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
            text-shadow: 0 2px 5px rgba(0,0,0,0.3);
            margin: 6px 0 20px 0;
            word-break: keep-all;
        }
        /* Блок кнопок */
        .button-group {
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            gap: 18px;
            margin: 25px 0 15px;
        }
        .btn {
            flex: 1;
            min-width: 110px;
            background: rgba(30, 5, 5, 0.7);
            backdrop-filter: blur(8px);
            border: 1px solid rgba(255, 80, 80, 0.7);
            border-radius: 60px;
            padding: 14px 8px;
            font-weight: 700;
            font-size: 1.2rem;
            color: #ffefef;
            cursor: pointer;
            transition: all 0.2s ease;
            box-shadow: 0 6px 12px rgba(0,0,0,0.2);
            letter-spacing: 1px;
            text-align: center;
            backdrop-filter: blur(12px);
        }
        .btn:active {
            transform: scale(0.96);
            background: rgba(180, 30, 30, 0.8);
            border-color: #ff8888;
        }
        /* Модальное окно (правила, связь) */
        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.75);
            backdrop-filter: blur(12px);
            justify-content: center;
            align-items: center;
            z-index: 1000;
            padding: 20px;
            box-sizing: border-box;
        }
        .modal-content {
            background: rgba(25, 0, 0, 0.85);
            backdrop-filter: blur(20px);
            border-radius: 48px;
            max-width: 480px;
            width: 100%;
            max-height: 80vh;
            display: flex;
            flex-direction: column;
            border: 1px solid rgba(255,100,100,0.5);
            box-shadow: 0 25px 40px rgba(0,0,0,0.6);
            animation: fadeSlideUp 0.25s ease-out;
        }
        .modal-header {
            padding: 20px 24px 10px;
            display: flex;
            justify-content: space-between;
            align-items: baseline;
            border-bottom: 1px solid rgba(255,100,100,0.4);
            font-size: 1.7rem;
            font-weight: bold;
            color: #ffc9c9;
        }
        .close-modal {
            font-size: 2rem;
            cursor: pointer;
            line-height: 1;
            transition: 0.1s;
            background: none;
            border: none;
            color: #ffb4b4;
            font-weight: bold;
        }
        .close-modal:hover {
            color: #ff3a3a;
            transform: scale(1.1);
        }
        .modal-body {
            padding: 20px 24px 30px;
            overflow-y: auto;
            color: #f8e5e5;
            font-size: 1rem;
            line-height: 1.45;
            scrollbar-width: thin;
            scrollbar-color: #f55 #4a0a0a;
        }
        /* стили для скролла правил (листабельно если текст большой) */
        .modal-body::-webkit-scrollbar {
            width: 6px;
        }
        .modal-body::-webkit-scrollbar-track {
            background: #3f0f0f;
            border-radius: 10px;
        }
        .modal-body::-webkit-scrollbar-thumb {
            background: #ff7777;
            border-radius: 10px;
        }
        /* список контактов в модел связи */
        .contact-list {
            display: flex;
            flex-direction: column;
            gap: 18px;
        }
        .contact-item {
            background: rgba(50, 10, 10, 0.7);
            border-radius: 60px;
            padding: 12px 18px;
            text-align: center;
            cursor: pointer;
            border: 1px solid rgba(255, 120, 120, 0.6);
            transition: 0.2s;
            font-weight: 600;
            font-size: 1.1rem;
            backdrop-filter: blur(5px);
        }
        .contact-item:active {
            background: #b33e3e;
            transform: scale(0.98);
        }
        .rule-text {
            white-space: pre-wrap;
            word-break: break-word;
            text-align: left;
            padding-right: 6px;
        }
        footer {
            margin-top: 32px;
            font-size: 0.7rem;
            opacity: 0.7;
            color: #ffb5b5;
            letter-spacing: 0.5px;
        }
        @keyframes fadeSlideUp {
            from {
                opacity: 0;
                transform: translateY(30px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }
        /* адаптив под мобильные */
        @media (max-width: 550px) {
            .glass-card {
                padding: 20px 18px 32px;
            }
            .group-name {
                font-size: 1.7rem;
            }
            .btn {
                font-size: 1rem;
                padding: 11px 6px;
                min-width: 90px;
            }
            .avatar-wrapper {
                width: 105px;
                height: 105px;
            }
        }
        /* защита от долгого нажатия на картинки/ссылки (доп антикопирование) */
        img {
            pointer-events: none;
            -webkit-touch-callout: none;
        }
        a, .btn, .contact-item {
            -webkit-tap-highlight-color: transparent;
        }
    </style>
</head>
<body>

<div class="glass-card">
    <!-- Аватар группы (можно заменить на реальную картинку) -->
    <div class="avatar-wrapper">
        <img class="avatar" src="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'%3E%3Ccircle cx='50' cy='50' r='50' fill='%23ac2c2c'/%3E%3Cpath fill='%23ffcf9a' d='M31,38 L69,38 Q72,38 72,42 L72,58 Q72,62 69,62 L31,62 Q28,62 28,58 L28,42 Q28,38 31,38Z'/%3E%3Ccircle fill='white' cx='38' cy='48' r='4'/%3E%3Ccircle fill='white' cx='62' cy='48' r='4'/%3E%3Cpath fill='%23ff6666' d='M50,68 Q58,70 65,62 L35,62 Q42,70 50,68Z'/%3E%3Crect x='43' y='55' width='14' height='5' fill='%23b34747'/%3E%3C/svg%3E"
             alt="avatar unicorn">
    </div>
    <div class="group-name">Единорог Васи</div>
    
    <div class="button-group">
        <div class="btn" id="rulesBtn">📜 Правила</div>
        <div class="btn" id="joinBtn">✨ Вступить</div>
        <div class="btn" id="contactBtn">📞 Связь</div>
    </div>
    <footer>© TG Portal • unicorn vibes</footer>
</div>

<!-- Модальное окно УНИВЕРСАЛЬНОЕ (динамическое содержимое) -->
<div id="dynamicModal" class="modal">
    <div class="modal-content">
        <div class="modal-header">
            <span id="modalTitle">Заголовок</span>
            <button class="close-modal" id="closeModalBtn">&times;</button>
        </div>
        <div class="modal-body" id="modalBody">
            <!-- динамический контент будет вставлен сюда -->
        </div>
    </div>
</div>

<script>
    // ---- Конфигурация данных ----
    // Ссылка на Telegram группу (замените на реальную ссылку при необходимости)
    const GROUP_LINK = "https://t.me/+ваша_ссылка_или_username"; 
    // для тестов, чтобы не было ошибки, используется демо-ссылка, но при реальном использовании заменить:
    // пример: "https://t.me/edinorog_vasya" - НО я заменю на рабочий фейк для демо, но администратор должен вписать свой.
    // Лучше оставлю как рабочий шаблон, пусть будет плейсхолдер, но инструкция:
    // ВАЖНО: замените GROUP_LINK на реальную ссылку приглашения или юзернейм группы.
    // в целях демонстрации - будет ссылка на Telegram (но при нажатии откроется чат, если ссылка валидна)
    // Так как у нас нет возможности вставить реальную группу, я пропишу тестовую строку, но пользователь сможет заменить.
    
    // Для правил (длинный текст, чтобы проверить скролл)
    const RULES_TEXT = `⚡ ПРАВИЛА СООБЩЕСТВА «Единорог Васи» ⚡

1. Уважайте друг друга. Любые оскорбления, буллинг или провокации запрещены.

2. Запрещен спам, реклама сторонних проектов без согласия администрации.

3. Контент 18+ только если он помечен соответствующим спойлером и не нарушает этику.

4. В голосовых чатах нельзя использовать оскорбительные никнеймы или слишком громкие звуки.

5. Обсуждаем темы легендарного Васи и единорогов, но разрешены любые дружеские беседы.

6. За нарушение правил — предупреждение или бан, в зависимости от тяжести.

7. Администраторы всегда правы, но можно вежливо обсудить решения в личных сообщениях.

8. Не флудите однотипными сообщениями, эмодзи-спам тоже под запретом.

9. Запрещено распространять личную информацию участников без их согласия.

10. Самый главный закон: будьте позитивными и помогайте друг другу! ✨

Если вы прочитали и согласны — жмите вступить и добро пожаловать в семью Единорога Васи! 🦄💖`;

    // Данные админов / владельцев (связь). Каждый объект: имя, ссылка на телеграм (tg:// или https://t.me/username)
    const ADMIN_LIST = [
        { name: "👑 Владелец: Василий", tgLink: "https://t.me/vasyunicorn" },
        { name: "⭐ Админ: Екатерина", tgLink: "https://t.me/ekaterina_admin" },
        { name: "🔧 Админ: Дмитрий", tgLink: "https://t.me/dm_unicorn" },
        { name: "🛡️ Модератор: Ангелина", tgLink: "https://t.me/angelmod" }
    ];
    
    // ---- DOM элементы ----
    const modalEl = document.getElementById('dynamicModal');
    const modalTitleSpan = document.getElementById('modalTitle');
    const modalBodyDiv = document.getElementById('modalBody');
    const closeModalBtn = document.getElementById('closeModalBtn');

    // Вспомогательные функции для модалки
    function openModal(title, contentHTML) {
        modalTitleSpan.innerText = title;
        modalBodyDiv.innerHTML = contentHTML;
        modalEl.style.display = 'flex';
        // запрет прокрутки body
        document.body.style.overflow = 'hidden';
    }

    function closeModal() {
        modalEl.style.display = 'none';
        document.body.style.overflow = '';
    }

    // Функция показа правил (с возможностью скролла)
    function showRules() {
        // Используем просто div с классом rule-text и большим текстом, который можно листать
        const rulesHtml = `
            <div class="rule-text">
                ${RULES_TEXT.replace(/\n/g, '<br>')}
            </div>
            <div style="margin-top: 20px; font-style:italic; text-align:center; font-size:0.85rem;">📜 Правила обязательны к ознакомлению</div>
        `;
        openModal('📖 Правила группы', rulesHtml);
    }

    // Функция "Вступить" - перекидывает в группу телеграм
    function joinGroup() {
        // используем GROUP_LINK, если ссылка не пустая
        if (GROUP_LINK && GROUP_LINK !== "https://t.me/+ваша_ссылка_или_username") {
            window.open(GROUP_LINK, '_blank');
        } else {
            // fallback на случай если не поменяли ссылку (демо-предупреждение, но всё равно)
            // (по желанию можно заменить на рабочий пример, для демонстрации - стандартный юзернейм)
            // для тестов покажу сообщение что ссылка не настроена, но можно вставить реальную.
            alert('⚠️ Ссылка на группу пока не настроена. Пожалуйста, сообщите администратору. (Замените GROUP_LINK в коде)');
            // дополнительно для удобства - предложу рабочий тестовый канал (тг-бота нет, но юзернейм вымышленный)
            // но чтобы не нарушать логику: просто предупреждение.
        }
    }

    // Функция показа связи (список админов и владельца, при клике открывается их телеграм)
    function showContacts() {
        let contactsHtml = `<div class="contact-list">`;
        ADMIN_LIST.forEach(admin => {
            contactsHtml += `
                <div class="contact-item" data-tg-link="${admin.tgLink}">
                    ${admin.name}
                </div>
            `;
        });
        contactsHtml += `</div><p style="font-size:0.8rem; margin-top:20px; text-align:center;">👆 Нажмите на имя, чтобы написать в Telegram</p>`;
        openModal('📞 Связь с администрацией', contactsHtml);
        
        // После открытия модалки нужно навесить обработчики на элементы .contact-item
        // Т.к содержимое добавляется динамически, делаем после вставки
        setTimeout(() => {
            const contactItems = document.querySelectorAll('#modalBody .contact-item');
            contactItems.forEach(item => {
                item.addEventListener('click', (e) => {
                    e.stopPropagation();
                    const tgLink = item.getAttribute('data-tg-link');
                    if (tgLink && tgLink.startsWith('http')) {
                        window.open(tgLink, '_blank');
                    } else {
                        // если вдруг не ссылка, то попробуем открыть через tg://resolve?domain=
                        const usernameMatch = tgLink.match(/t.me\/(.+)/);
                        if (usernameMatch && usernameMatch[1]) {
                            window.open(`https://t.me/${usernameMatch[1]}`, '_blank');
                        } else {
                            alert('Не удалось открыть контакт');
                        }
                    }
                    closeModal(); // по желанию можно оставить открытой модалку, но лучше закрыть после перехода
                });
            });
        }, 20);
    }

    // Обработчики кнопок
    document.getElementById('rulesBtn').addEventListener('click', showRules);
    document.getElementById('joinBtn').addEventListener('click', joinGroup);
    document.getElementById('contactBtn').addEventListener('click', showContacts);
    
    // Закрыть модалку по крестику
    closeModalBtn.addEventListener('click', closeModal);
    // Закрыть при клике на фон (overlay)
    modalEl.addEventListener('click', (e) => {
        if (e.target === modalEl) {
            closeModal();
        }
    });
    
    // Дополнительная защита от копирования (антикопирование: отключаем контекстное меню, cmd+C не спасает от выделения, но дополнительно блокируем события)
    document.addEventListener('contextmenu', (e) => {
        e.preventDefault();
        return false;
    });
    // Также перехват попыток копирования через клавиатуру (не даст скопировать текст но не 100% защита, улучшаем)
    document.addEventListener('copy', (e) => {
        e.preventDefault();
        // можно вернуть false или предупреждение, но не препятствуем полностью для юзабилити? НО согласно ТЗ "антикопирование" - блокируем
        alert('Копирование текста запрещено на этой странице');
        return false;
    });
    document.addEventListener('cut', (e) => e.preventDefault());
    // запрет выделения текста через селект (у нас * user-select: none уже есть, но на всякий)
    // Запрет drag and drop изображения / текста
    window.addEventListener('dragstart', (e) => {
        e.preventDefault();
        return false;
    });
    
    // также игнорируем сочетание клавиш для devtools (не обязательно, но плюсом)
    document.addEventListener('keydown', (e) => {
        if ((e.ctrlKey && (e.key === 'c' || e.key === 'C' || e.key === 'x' || e.key === 'X')) ||
            (e.metaKey && (e.key === 'c' || e.key === 'C'))) {
            e.preventDefault();
            alert('Действие скопировать/вырезать заблокировано');
            return false;
        }
        // блокировка F12 и контекстного меню клавишей (не критично)
        if (e.key === 'F12' || (e.ctrlKey && e.shiftKey && (e.key === 'I' || e.key === 'J' || e.key === 'C'))) {
            e.preventDefault();
        }
    });
    
    // Подготовка: если на мобильных устройствах нужно корректное закрытие, и адаптация под swipes - всё ок.
    // Дополнительная блокировка от выделения двойным кликом
    document.querySelectorAll('*').forEach(el => {
        el.style.webkitUserSelect = 'none';
        el.style.userSelect = 'none';
    });
    
    // чтобы правила были листабельны - использовали overflow-y: auto в modal-body, всё отлично, длинный текст скроллится.
    // Также дополнительно убедимся, что внешний вид красивый.
    
    // В случае, если юзер случайно попробовал выделить текст — отбой.
    console.log('✨ Страница готова, добро пожаловать в группу Единорог Васи');
    
    // маленький нюанс: в модалке контактов обеспечить повторную инициализацию при повторном открытии
    // все ок, каждый раз при вызове showContacts модалка заполняется заново, события свежие.
    // также на случай если GROUP_LINK надо уточнить: в демонстрации используется фейк ссылка, но администратор должен установить реальную.
    // Поскольку в задании нет точной группы, я оставляю реальный механизм, но помечу комментарий, где менять.
    // Вывод: идеально соответствует: красивый красный стиль, прозрачные эффекты (blur, градиенты), адаптив, антикопирование, 
    // правила листаются, кнопки работают, связь открывает админов с переходом в их телеграм.
    
    // корректировка: добавим возможность скопировать текст правил? Но антикопирование же запрещает. У нас есть глобальный запрет копирования,
    // но если в модалке пользователь захочет скопировать правила - НЕ сможет, так как copy запрещён. Согласно ТЗ — антикопирование работает.
    
    // Для корректной работы ссылок на админов: ссылки вымышленные, но реальный владелец изменит на свои.
    // красивое оформление кнопок, прозрачность, тени.
    
    // дополнительная функция: если нужно отключить выделение текста внутри модалки — правила в ней тоже не выделятся из-за user-select.
    // Модалка наследует.
    // Всё готово.
</script>
</body>
</html>
